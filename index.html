<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electronic Music Atlas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body class="home-page">

  <!-- 🎥 背景视频 -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="home-background.mp4" type="video/mp4">
  </video>

  <div class="bg-overlay"></div>

  <!-- 🎵 背景音乐 -->
  <audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <!-- 导航 -->
  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="active">Home</a>
      <a href="genres.html">Genres</a>
      <a href="djs.html">DJs</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <!-- 主视觉 -->
  <main class="home-hero">

    <h1 class="home-title">Electronic Music Atlas</h1>

    <p class="home-sub">
      A visual and sonic journey through underground electronic culture.
    </p>

    <button class="enter-btn" id="enterBtn">
      ENTER EXPERIENCE
    </button>

  </main>

  <script>
    const music = document.getElementById('bg-music');
    const btn = document.getElementById('enterBtn');

    btn.addEventListener('click', () => {
      music.volume = 0.5;
      music.play();
      btn.innerText = "Sound On";
    });
  </script>

</body>
</html>
